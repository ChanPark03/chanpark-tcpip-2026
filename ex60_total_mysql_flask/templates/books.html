{% extends 'base.html' %}

{% block title %} 도서 목록 {% endblock %}

{% block content %}
<h2> 전체 도서 목록 </h2>
<div id="bookList">도서 목록을 로딩중입니다...</div>
<script>
    async function loadBooks(){
        const res = await fetch('/api/books');
        const books = await res.json();
        
        // 10 == '10', 10 === 10
        if(books.length === 0){
            document.getElementById('bookList').innerHTML = '<p>등록된 도서가 없습니다.</p>';
            return;

        }
        document.getElementById('bookList').innerHTML = books.map(book=> `
            <div>
                <div style="display : flex; justify-content: space-between;aligh-items:center;">
                    <strong>${book.bookname}</strong>
                    <span style="color:#77777">(출판사: ${book.publisher})</span>
                    <div style="color:green">${book.price}원</div>
                </div>
                <button onclick="orderBook(${book.id}, ${book.price})">주문하기</button>
            </div>
        `).join('');

    }

    async function orderBook(bookId, price){
        if(!confirm('이 도서를 주문하시겠습니까?')) return;
        const res = await fetch('/api/order', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({bookId, price})
        });
        if(res.ok){
            alert('주문이 완료되었습니다.');
            location.href = '/my_orders';
        }else{
            alert('주문에 실패했습니다.');
        }
    }
        
    
      
</script>

{% endblock %}
