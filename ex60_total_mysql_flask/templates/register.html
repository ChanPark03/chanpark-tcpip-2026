{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<h2>회원가입</h2>
<form id="regForm">
<input type="text" id="name" placeholder="이름 (로그인 ID)" required>
<input type="text" id="address" placeholder="주소">
<input type="text" id="phone" placeholder="전화번호">
<input type="password" id="password" placeholder="비밀 번호" required>
<button type= "submit">가입 하기</button>
</form>
<p>ID/PW가 생각 났나요? <a href="/">로그인 하러가기</a> </p>

<script>
document.getElementById('regForm').addEventListener('submit',
    async (e)=>{
        e.preventDefault();
        const data={
            name: document.getElementById('name').value,
            address: document.getElementById('address').value,
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value
        }
      
        const response = await fetch('/api/register', { //ajax(old) <-> axios(호환성)
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(data)
        });

        const result = await response.json();
        if(response.ok && result.success){
            alert(result.message);
            window.location.href = '/';

        }else{
            alert('회원가입 실패');
        }
    }
);

</script>
{% endblock %}
