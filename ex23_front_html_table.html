<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <tr>
            <td>1</td><td>2</td>
        </tr>
        <tr>
            <td>3</td><td>4</td>
        </tr>
        <tr>
            <td>5</td><td>6</td>
        </tr>
    </table>
    <table>
        <caption>처음 그려보는 표</caption>
        <thead>
            <tr>
                <th>컬럼이름1</th>
                <th>컬럼이름2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1행 1열</td>
                <td>1행 2열</td>
            </tr>
        </tbody>
    </table>
    <table style="border: solid 1px black">
        <caption>table row span</caption>
        <tr>
            <td>1-1</td> <td>1-2</td> <td>1-3</td> <td>1-4</td>
        </tr>
        <tr>
            <td>2-1</td> <td rowspan="3" style="border: solid 1px black">2-2</td> 
            <!-- <td>2-3</td> <td>2-4</td> -->
        </tr>
        <tr>
            <td>3-1</td> <td>3-2</td> <td>3-3</td> <td>3-4</td>
        </tr>
    </table>
     <table style="border: solid 1px black">
        <caption>col span</caption>
        <tr>
            <td>1-1</td> <td>1-2</td> <td>1-3</td> <td>1-4</td>
        </tr>
        <tr>
            <td>2-1</td> <td colspan="3" style="border: solid 1px black">2-2</td> 
            <!-- <td>2-3</td> <td>2-4</td> -->
        </tr>
        <tr>
            <td>3-1</td> <td>3-2</td> <td>3-3</td> <td>3-4</td>
        </tr>
    </table>
</body>
</html>
