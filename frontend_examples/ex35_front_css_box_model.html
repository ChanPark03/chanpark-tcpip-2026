<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            width: 100px; height: 100px; background-color: yellow;
            margin: 50px;
        }
        .box2{
            width: 100px; height: 100px; background-color: blueviolet;
            margin: 50px 50px 100px 50px;
        }
    </style>
</head>

<body>
    <p>content-box vs border-box </p>
    <div style="margin: 10px; border: 5px solid black; padding: 20px;
     width: 300px; height: 100px;">박스 테스트(content-box)</div>

    <div style="margin: 10px; border: 5px solid black; padding: 20px;
     width: 300px; height: 100px; box-sizing: border-box">박스 테스트(border-box)</div>
    <div style="border: solid black; margin:10px; width: 300px; height: 100px; 
     border-width: 5px 10px 20px 30px;">5px 10px 20px 30px 방향 순서</div>
    <div style="border: solid black; margin:10px; width: 300px; height: 100px; 
     border-width: 5px  30px;">5px 30px 방향 순서</div>

    <div style="height: 200px; background-color:brown;">
        <div style="width: 100px; height: 100px; background-color:blue;
        margin: auto;">박스에 가운데 정렬</div>
    </div>
    <p> margin 중첩 테스트</p>
    <div class="box1"></div>
    <div class="box1"></div>
    <div class="box1"></div>
    
    <p> margin 중첩을 고려한 대처</p>
    <div class="box2"></div>
    <div class="box2"></div>
    <div class="box2"></div>
</body>

</html>
