<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRESH66 | 신선한 과일 구매</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #070707;
      --muted: #626262;
      --line: #dddddd;
      --soft-line: #eeeeee;
      --green: #147a37;
      --green-dark: #0e5d2a;
      --green-soft: #eaf7ee;
      --coral: #ff4b35;
      --soft: #f7f8f5;
      --shadow: 0 20px 70px rgba(6, 18, 9, 0.08);
      --radius: 8px;
      --max: 1440px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Inter", "Segoe UI", "Malgun Gothic", Arial, sans-serif;
      letter-spacing: 0;
      overflow-x: hidden;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .nav {
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      align-items: center;
      width: min(100%, var(--max));
      min-height: 68px;
      margin: 0 auto;
      padding: 0 28px;
    }

    .brand {
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
    }

    .nav-links {
      display: flex;
      justify-content: center;
      gap: 58px;
      font-size: 15px;
      font-weight: 800;
    }

    .nav-links a {
      position: relative;
      padding: 26px 0 23px;
    }

    .nav-links a:first-child::after {
      position: absolute;
      right: 0;
      bottom: 13px;
      left: 0;
      height: 3px;
      background: var(--green);
      content: "";
    }

    .nav-actions {
      display: flex;
      justify-content: flex-end;
      gap: 18px;
    }

    .icon-button {
      position: relative;
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 0;
      background: transparent;
      color: var(--text);
    }

    .icon-button svg {
      width: 25px;
      height: 25px;
      stroke-width: 2;
    }

    .cart-count {
      position: absolute;
      top: 2px;
      right: 2px;
      display: grid;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .hero-shell {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 16px 28px 0;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 366px;
      gap: 28px;
      align-items: stretch;
      min-height: 418px;
    }

    .hero-main {
      position: relative;
      display: grid;
      grid-template-columns: minmax(280px, 0.72fr) minmax(320px, 1.28fr);
      align-items: center;
      min-width: 0;
      overflow: hidden;
      border-bottom: 1px solid var(--soft-line);
    }

    .hero-copy {
      position: relative;
      z-index: 2;
      padding: 34px 0 38px;
    }

    h1 {
      max-width: 560px;
      margin: 0;
      font-size: clamp(44px, 5.4vw, 82px);
      font-weight: 950;
      line-height: 0.96;
      letter-spacing: 0;
    }

    .hero-copy p {
      max-width: 420px;
      margin: 26px 0 30px;
      color: #444;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.65;
    }

    .primary-button,
    .secondary-button,
    .outline-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .primary-button {
      min-width: 176px;
      padding: 0 26px;
      border: 1px solid var(--green);
      background: var(--green);
      color: #fff;
      box-shadow: 0 14px 30px rgba(20, 122, 55, 0.18);
    }

    .primary-button:hover {
      background: var(--green-dark);
      transform: translateY(-1px);
    }

    .hero-art {
      position: relative;
      display: grid;
      min-height: 374px;
      place-items: center;
      isolation: isolate;
    }

    .hero-art::before {
      position: absolute;
      right: 8%;
      bottom: 18%;
      width: min(72%, 520px);
      height: 28%;
      background: radial-gradient(ellipse, rgba(10, 30, 11, 0.14), rgba(10, 30, 11, 0));
      content: "";
      filter: blur(10px);
      z-index: -1;
    }

    .hero-art img {
      width: min(100%, 620px);
      max-height: 390px;
      object-fit: contain;
      filter: drop-shadow(0 24px 34px rgba(13, 28, 11, 0.15));
    }

    .leaf {
      position: absolute;
      background: var(--green-soft);
      border: 1px solid rgba(20, 122, 55, 0.14);
      transform: rotate(-18deg);
    }

    .leaf.one {
      right: 12%;
      bottom: 42px;
      width: 118px;
      height: 56px;
      border-radius: 88% 4px 88% 4px;
    }

    .leaf.two {
      top: 96px;
      left: 7%;
      width: 86px;
      height: 42px;
      border-radius: 88% 4px 88% 4px;
      opacity: 0.8;
      transform: rotate(22deg);
    }

    .cart-panel {
      align-self: center;
      min-width: 0;
      padding: 22px 24px 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
    }

    .panel-head,
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .panel-head h2,
    .section-head h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 950;
      line-height: 1.2;
    }

    .text-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 0;
      background: transparent;
      color: #333;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .text-link svg {
      width: 14px;
      height: 14px;
    }

    .cart-list {
      display: grid;
      gap: 18px;
      margin: 18px 0 20px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 14px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--soft-line);
    }

    .cart-item:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .thumb {
      overflow: hidden;
      width: 70px;
      height: 70px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cart-info {
      min-width: 0;
    }

    .cart-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .cart-name {
      margin: 2px 0 6px;
      font-size: 15px;
      font-weight: 900;
    }

    .cart-meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .remove-button {
      display: grid;
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      place-items: center;
      border: 0;
      background: transparent;
      color: #777;
    }

    .remove-button svg {
      width: 16px;
      height: 16px;
    }

    .cart-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
    }

    .qty-control {
      display: inline-grid;
      grid-template-columns: 34px 38px 34px;
      overflow: hidden;
      min-height: 33px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fff;
    }

    .qty-control button,
    .qty-control output {
      display: grid;
      min-width: 0;
      place-items: center;
      border: 0;
      background: #fff;
      color: var(--text);
      font-size: 15px;
      font-weight: 850;
      line-height: 1;
    }

    .qty-control button {
      transition: background 140ms ease, color 140ms ease;
    }

    .qty-control button:hover {
      background: var(--green-soft);
      color: var(--green-dark);
    }

    .qty-control output {
      border-right: 1px solid var(--line);
      border-left: 1px solid var(--line);
    }

    .price {
      color: var(--coral);
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
    }

    .totals {
      display: grid;
      gap: 12px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      color: #222;
      font-size: 15px;
      font-weight: 750;
    }

    .total-row.grand {
      align-items: end;
      padding-top: 8px;
      color: var(--text);
      font-size: 18px;
      font-weight: 950;
    }

    .grand-price {
      color: var(--coral);
      font-size: 32px;
      line-height: 1;
    }

    .cart-panel .primary-button {
      width: 100%;
      margin-top: 20px;
      min-height: 54px;
    }

    .shop-section {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 34px 28px 0;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-top: 14px;
    }

    .product-card {
      overflow: hidden;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .product-card:hover {
      border-color: rgba(20, 122, 55, 0.45);
      box-shadow: 0 18px 46px rgba(6, 18, 9, 0.1);
      transform: translateY(-3px);
    }

    .product-image {
      aspect-ratio: 1.48 / 1;
      background: var(--soft);
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-body {
      padding: 14px 14px 13px;
    }

    .product-name {
      margin: 0 0 4px;
      font-size: 17px;
      font-weight: 950;
    }

    .product-meta {
      min-height: 20px;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .product-price {
      margin: 10px 0 14px;
      text-align: right;
      color: var(--coral);
      font-size: 20px;
      font-weight: 950;
    }

    .product-actions {
      display: grid;
      grid-template-columns: 104px 1fr;
      gap: 10px;
      align-items: center;
    }

    .secondary-button,
    .outline-button {
      min-height: 34px;
      padding: 0 12px;
      font-size: 13px;
    }

    .secondary-button {
      gap: 7px;
      border: 1px solid var(--green);
      background: #fff;
      color: var(--green-dark);
    }

    .secondary-button svg,
    .outline-button svg {
      width: 17px;
      height: 17px;
      stroke-width: 2;
    }

    .secondary-button:hover,
    .outline-button:hover {
      background: var(--green-soft);
    }

    .benefits {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 26px;
      width: min(100%, var(--max));
      margin: 26px auto 0;
      padding: 20px 28px 24px;
      border-top: 1px solid var(--soft-line);
      border-bottom: 1px solid var(--soft-line);
    }

    .benefit {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 14px;
      align-items: center;
    }

    .benefit-icon {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      color: var(--green-dark);
    }

    .benefit-icon svg {
      width: 36px;
      height: 36px;
      stroke-width: 1.7;
    }

    .benefit h3 {
      margin: 0 0 5px;
      font-size: 15px;
      font-weight: 950;
    }

    .benefit p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
    }

    .final-cta {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 12px 28px 34px;
    }

    .banner {
      position: relative;
      display: grid;
      min-height: 118px;
      place-items: center;
      overflow: hidden;
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0), #fff 25%, #fff 76%, rgba(255, 255, 255, 0)),
        var(--soft);
    }

    .banner::before,
    .banner::after {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 32%;
      background-size: cover;
      background-position: center;
      content: "";
    }

    .banner::before {
      left: 0;
      background-image: url("img/banana.jpg");
    }

    .banner::after {
      right: 0;
      background-image: url("img/lych.jpg");
    }

    .banner-content {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 14px;
      padding: 20px;
      text-align: center;
    }

    .banner h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 950;
      line-height: 1.15;
    }

    .banner .primary-button {
      min-height: 42px;
      min-width: 154px;
      font-size: 15px;
    }

    .toast {
      position: fixed;
      right: 28px;
      bottom: 26px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: calc(100vw - 56px);
      padding: 14px 16px;
      border: 1px solid rgba(20, 122, 55, 0.24);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      box-shadow: var(--shadow);
      font-size: 14px;
      font-weight: 850;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
    }

    .toast svg {
      width: 20px;
      height: 20px;
      color: var(--green);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1180px) {
      .nav {
        grid-template-columns: 180px 1fr 150px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .hero-main {
        grid-template-columns: minmax(260px, 0.75fr) minmax(320px, 1.25fr);
      }

      .cart-panel {
        align-self: auto;
      }

      .cart-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      .nav {
        grid-template-columns: 1fr auto;
        min-height: 62px;
        padding: 0 18px;
      }

      .brand {
        font-size: 24px;
      }

      .nav-links {
        display: none;
      }

      .nav-actions {
        gap: 8px;
      }

      .hero-shell,
      .shop-section,
      .benefits,
      .final-cta {
        padding-right: 18px;
        padding-left: 18px;
      }

      .hero-main {
        grid-template-columns: 1fr;
        min-height: 0;
        padding-top: 18px;
      }

      .hero-copy {
        padding: 20px 0 0;
      }

      .hero-copy p {
        margin: 18px 0 22px;
        font-size: 15px;
      }

      .hero-art {
        min-height: 255px;
        margin-top: -8px;
      }

      .hero-art img {
        max-height: 275px;
      }

      .cart-panel {
        padding: 18px;
      }

      .cart-list {
        grid-template-columns: 1fr;
      }

      .product-grid,
      .benefits {
        grid-template-columns: 1fr;
      }

      .benefits {
        gap: 16px;
        margin-top: 20px;
        padding-top: 18px;
        padding-bottom: 18px;
      }

      .product-actions {
        grid-template-columns: 110px 1fr;
      }

      .banner {
        min-height: 178px;
      }

      .banner::before,
      .banner::after {
        width: 50%;
        opacity: 0.34;
      }
    }

    @media (max-width: 640px) {
      .nav-actions .icon-button:first-child {
        display: none;
      }

      .hero-copy {
        max-width: 330px;
      }

      h1 {
        max-width: 330px;
        font-size: clamp(31px, 8.6vw, 34px);
        line-height: 1.02;
      }

      .hero-copy p {
        max-width: 330px;
        font-size: 14px;
      }

      .icon-button {
        width: 36px;
        height: 36px;
      }

      .panel-head,
      .section-head {
        align-items: flex-start;
      }

      .cart-panel .panel-head .text-link {
        display: none;
      }

      .cart-item {
        grid-template-columns: 58px minmax(0, 1fr);
        gap: 12px;
      }

      .thumb {
        width: 58px;
        height: 58px;
      }

      .cart-bottom {
        align-items: flex-start;
        flex-direction: column-reverse;
      }

      .cart-panel {
        width: 100%;
        overflow: hidden;
      }

      .grand-price {
        font-size: 28px;
      }

      .total-row.grand {
        flex-wrap: wrap;
        gap: 8px;
      }

      .product-actions {
        grid-template-columns: 1fr;
      }

      .product-actions .qty-control {
        width: 112px;
      }

      .secondary-button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <nav class="nav" aria-label="주요 메뉴">
        <a class="brand" href="#top">FRESH66</a>
        <div class="nav-links" aria-label="페이지 이동">
          <a href="#top">홈</a>
          <a href="#products">상품</a>
          <a href="#benefits">혜택</a>
          <a href="#cart">장바구니</a>
        </div>
        <div class="nav-actions">
          <button class="icon-button" type="button" aria-label="검색">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m16.5 16.5 4 4"></path>
            </svg>
          </button>
          <button class="icon-button" type="button" aria-label="장바구니로 이동" data-scroll-cart>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <path d="M6.3 6h15l-1.8 8.6a2 2 0 0 1-2 1.6H9.1a2 2 0 0 1-2-1.7L5.4 3.8H2.7"></path>
              <circle cx="9.4" cy="20" r="1.4"></circle>
              <circle cx="18" cy="20" r="1.4"></circle>
            </svg>
            <span class="cart-count" data-cart-count>2</span>
          </button>
        </div>
      </nav>
    </header>

    <main id="top">
      <section class="hero-shell" aria-labelledby="hero-title">
        <div class="hero">
          <div class="hero-main">
            <div class="hero-copy">
              <h1 id="hero-title">오늘 가장 신선한 과일, FRESH66</h1>
              <p>산지에서 바로 선별한 프리미엄 과일을 가장 신선하게 집까지 배송해드립니다.</p>
              <a class="primary-button" href="#products">지금 구매하기</a>
            </div>

            <div class="hero-art" aria-hidden="true">
              <span class="leaf one"></span>
              <span class="leaf two"></span>
              <img src="img/watermelon.jpg" alt="">
            </div>
          </div>

          <aside class="cart-panel" id="cart" aria-label="장바구니 요약">
            <div class="panel-head">
              <h2>장바구니</h2>
              <button class="text-link" type="button" data-scroll-products>
                전체 보기
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                  <path d="m9 18 6-6-6-6"></path>
                </svg>
              </button>
            </div>

            <div class="cart-list" data-cart-list></div>

            <div class="totals">
              <div class="total-row">
                <span>상품금액</span>
                <strong data-subtotal>0원</strong>
              </div>
              <div class="total-row">
                <span>배송비</span>
                <strong data-shipping>0원</strong>
              </div>
              <div class="total-row grand">
                <span>합계</span>
                <strong class="grand-price" data-grand-total>0원</strong>
              </div>
            </div>

            <button class="primary-button" type="button" data-checkout>지금 구매하기</button>
          </aside>
        </div>
      </section>

      <section class="shop-section" id="products" aria-labelledby="products-title">
        <div class="section-head">
          <h2 id="products-title">신선한 추천 과일</h2>
          <button class="text-link" type="button" data-scroll-products>
            전체 상품 보기
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <path d="m9 18 6-6-6-6"></path>
            </svg>
          </button>
        </div>
        <div class="product-grid" data-product-grid></div>
      </section>

      <section class="benefits" id="benefits" aria-label="구매 혜택">
        <article class="benefit">
          <div class="benefit-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M3 7h11v10H3z"></path>
              <path d="M14 10h4l3 3v4h-7z"></path>
              <circle cx="7" cy="19" r="1.8"></circle>
              <circle cx="18" cy="19" r="1.8"></circle>
            </svg>
          </div>
          <div>
            <h3>산지 직송</h3>
            <p>산지에서 바로 신선하게</p>
          </div>
        </article>
        <article class="benefit">
          <div class="benefit-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M5 21c8-1 13-6 14-16-8 1-13 6-14 16Z"></path>
              <path d="M4 20c3-5 7-8 12-10"></path>
            </svg>
          </div>
          <div>
            <h3>신선 보장</h3>
            <p>꼼꼼하게 선별한 과일만</p>
          </div>
        </article>
        <article class="benefit">
          <div class="benefit-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M12 2v20"></path>
              <path d="m5 5 14 14"></path>
              <path d="M2 12h20"></path>
              <path d="m19 5-14 14"></path>
            </svg>
          </div>
          <div>
            <h3>콜드체인 배송</h3>
            <p>신선도 유지를 위한 냉장 배송</p>
          </div>
        </article>
        <article class="benefit">
          <div class="benefit-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M12 3 20 6v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"></path>
              <path d="m8.5 12 2.3 2.3 4.8-5"></path>
            </svg>
          </div>
          <div>
            <h3>안심 결제</h3>
            <p>안전하고 간편한 결제 시스템</p>
          </div>
        </article>
      </section>

      <section class="final-cta" aria-labelledby="final-title">
        <div class="banner">
          <div class="banner-content">
            <h2 id="final-title">지금, 가장 맛있는 과일을 만나보세요</h2>
            <a class="primary-button" href="#products">지금 구매하기</a>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" role="status" aria-live="polite" data-toast>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
      <path d="M20 6 9 17l-5-5"></path>
    </svg>
    <span data-toast-text>장바구니에 담았습니다.</span>
  </div>

  <script>
    const products = [
      {
        id: "watermelon",
        name: "수박",
        meta: "1통 (7~8kg)",
        price: 28900,
        image: "img/watermelon.jpg",
        quantity: 1
      },
      {
        id: "banana",
        name: "바나나",
        meta: "1송이 (1.2kg 내외)",
        price: 3900,
        image: "img/banana.jpg",
        quantity: 1
      },
      {
        id: "lychee",
        name: "리치",
        meta: "500g (냉장)",
        price: 8900,
        image: "img/lych.jpg",
        quantity: 1
      },
      {
        id: "box",
        name: "시즌 과일 박스",
        meta: "3~4종 구성 (2.5kg 내외)",
        price: 19900,
        image: "img/watermelon.jpg",
        quantity: 1
      }
    ];

    const cart = new Map([
      ["watermelon", 1],
      ["banana", 1]
    ]);

    const formatWon = (value) => `${value.toLocaleString("ko-KR")}원`;
    const productGrid = document.querySelector("[data-product-grid]");
    const cartList = document.querySelector("[data-cart-list]");
    const cartCount = document.querySelector("[data-cart-count]");
    const subtotal = document.querySelector("[data-subtotal]");
    const shipping = document.querySelector("[data-shipping]");
    const grandTotal = document.querySelector("[data-grand-total]");
    const toast = document.querySelector("[data-toast]");
    const toastText = document.querySelector("[data-toast-text]");
    let toastTimer;

    function showToast(message) {
      toastText.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function quantityMarkup(id, quantity, label) {
      return `
        <div class="qty-control" aria-label="${label} 수량">
          <button type="button" aria-label="${label} 수량 줄이기" data-dec="${id}">−</button>
          <output aria-label="현재 수량">${quantity}</output>
          <button type="button" aria-label="${label} 수량 늘리기" data-inc="${id}">+</button>
        </div>
      `;
    }

    function renderProducts() {
      productGrid.innerHTML = products.map((product) => `
        <article class="product-card">
          <div class="product-image">
            <img src="${product.image}" alt="${product.name}">
          </div>
          <div class="product-body">
            <h3 class="product-name">${product.name}</h3>
            <p class="product-meta">${product.meta}</p>
            <p class="product-price">${formatWon(product.price)}</p>
            <div class="product-actions">
              ${quantityMarkup(product.id, product.quantity, product.name)}
              <button class="secondary-button" type="button" data-add="${product.id}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                  <path d="M6.3 6h15l-1.8 8.6a2 2 0 0 1-2 1.6H9.1a2 2 0 0 1-2-1.7L5.4 3.8H2.7"></path>
                  <circle cx="9.4" cy="20" r="1.4"></circle>
                  <circle cx="18" cy="20" r="1.4"></circle>
                </svg>
                장바구니 담기
              </button>
            </div>
          </div>
        </article>
      `).join("");
    }

    function renderCart() {
      const selected = Array.from(cart.entries())
        .map(([id, qty]) => {
          const product = products.find((item) => item.id === id);
          return product ? { ...product, quantity: qty } : null;
        })
        .filter(Boolean);

      if (selected.length === 0) {
        cartList.innerHTML = `
          <div class="cart-item">
            <div class="thumb" aria-hidden="true"></div>
            <div class="cart-info">
              <p class="cart-name">장바구니가 비었습니다</p>
              <p class="cart-meta">마음에 드는 과일을 담아보세요.</p>
            </div>
          </div>
        `;
      } else {
        cartList.innerHTML = selected.map((product) => `
          <article class="cart-item">
            <div class="thumb">
              <img src="${product.image}" alt="${product.name}">
            </div>
            <div class="cart-info">
              <div class="cart-top">
                <div>
                  <p class="cart-name">${product.name}</p>
                  <p class="cart-meta">${product.meta}</p>
                </div>
                <button class="remove-button" type="button" aria-label="${product.name} 삭제" data-remove="${product.id}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M18 6 6 18"></path>
                    <path d="m6 6 12 12"></path>
                  </svg>
                </button>
              </div>
              <div class="cart-bottom">
                ${quantityMarkup(product.id, product.quantity, product.name)}
                <strong class="price">${formatWon(product.price * product.quantity)}</strong>
              </div>
            </div>
          </article>
        `).join("");
      }

      const itemCount = selected.reduce((sum, product) => sum + product.quantity, 0);
      const productTotal = selected.reduce((sum, product) => sum + product.price * product.quantity, 0);
      const delivery = productTotal > 0 && productTotal < 30000 ? 3000 : 0;

      cartCount.textContent = itemCount;
      subtotal.textContent = formatWon(productTotal);
      shipping.textContent = formatWon(delivery);
      grandTotal.textContent = formatWon(productTotal + delivery);
    }

    function updateProductQuantity(id, step) {
      const product = products.find((item) => item.id === id);
      if (!product) return;
      product.quantity = Math.max(1, Math.min(9, product.quantity + step));
      renderProducts();
    }

    function updateCartQuantity(id, step) {
      if (!cart.has(id)) return;
      const next = Math.max(0, Math.min(9, cart.get(id) + step));
      if (next === 0) {
        cart.delete(id);
      } else {
        cart.set(id, next);
      }
      renderCart();
    }

    function addToCart(id) {
      const product = products.find((item) => item.id === id);
      if (!product) return;
      cart.set(id, (cart.get(id) || 0) + product.quantity);
      product.quantity = 1;
      renderProducts();
      renderCart();
      showToast(`${product.name}을 장바구니에 담았습니다.`);
    }

    document.addEventListener("click", (event) => {
      const addButton = event.target.closest("[data-add]");
      const incButton = event.target.closest("[data-inc]");
      const decButton = event.target.closest("[data-dec]");
      const removeButton = event.target.closest("[data-remove]");

      if (addButton) {
        addToCart(addButton.dataset.add);
        return;
      }

      if (incButton) {
        const inCart = incButton.closest(".cart-panel");
        inCart ? updateCartQuantity(incButton.dataset.inc, 1) : updateProductQuantity(incButton.dataset.inc, 1);
        return;
      }

      if (decButton) {
        const inCart = decButton.closest(".cart-panel");
        inCart ? updateCartQuantity(decButton.dataset.dec, -1) : updateProductQuantity(decButton.dataset.dec, -1);
        return;
      }

      if (removeButton) {
        const product = products.find((item) => item.id === removeButton.dataset.remove);
        cart.delete(removeButton.dataset.remove);
        renderCart();
        showToast(`${product ? product.name : "상품"}을 장바구니에서 삭제했습니다.`);
      }
    });

    document.querySelector("[data-checkout]").addEventListener("click", () => {
      if (cart.size === 0) {
        showToast("먼저 상품을 장바구니에 담아주세요.");
        return;
      }
      showToast("주문이 준비되었습니다. 신선하게 포장해드릴게요.");
    });

    document.querySelector("[data-scroll-cart]").addEventListener("click", () => {
      document.querySelector("#cart").scrollIntoView({ behavior: "smooth", block: "center" });
    });

    document.querySelectorAll("[data-scroll-products]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelector("#products").scrollIntoView({ behavior: "smooth" });
      });
    });

    renderProducts();
    renderCart();
  </script>
</body>
</html>
